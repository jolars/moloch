name: Docs

on:
  push:
    branches:
      - main
      - "tl/**"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_as:
        description: "Publish channel target"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - latest
          - dev
          - texlive
      texlive_year:
        description: "TeX Live year when publish_as=texlive (optional)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: "docs-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Determine docs targets
        id: targets
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_PUBLISH_AS: ${{ github.event.inputs.publish_as }}
          DISPATCH_TEXLIVE_YEAR: ${{ github.event.inputs.texlive_year }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "workflow_dispatch" && "${DISPATCH_PUBLISH_AS:-auto}" != "auto" ]]; then
            case "${DISPATCH_PUBLISH_AS}" in
              latest)
                echo "targets=. latest" >> "$GITHUB_OUTPUT"
                echo "doc_channel=latest" >> "$GITHUB_OUTPUT"
                ;;
              dev)
                echo "targets=dev" >> "$GITHUB_OUTPUT"
                echo "doc_channel=dev" >> "$GITHUB_OUTPUT"
                ;;
              texlive)
                if [[ -n "${DISPATCH_TEXLIVE_YEAR:-}" ]]; then
                  echo "targets=texlive/${DISPATCH_TEXLIVE_YEAR} texlive/latest" >> "$GITHUB_OUTPUT"
                  echo "doc_channel=texlive-${DISPATCH_TEXLIVE_YEAR}" >> "$GITHUB_OUTPUT"
                else
                  echo "targets=texlive/latest" >> "$GITHUB_OUTPUT"
                  echo "doc_channel=texlive-latest" >> "$GITHUB_OUTPUT"
                fi
                ;;
              *)
                echo "Unsupported manual publish_as value: ${DISPATCH_PUBLISH_AS}"
                exit 1
                ;;
            esac
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "targets=. latest releases/${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "doc_channel=latest" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "targets=dev" >> "$GITHUB_OUTPUT"
            echo "doc_channel=dev" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_NAME}" == tl/* ]]; then
            year="${GITHUB_REF_NAME#tl/}"
            echo "targets=texlive/${year} texlive/latest" >> "$GITHUB_OUTPUT"
            echo "doc_channel=texlive-${year}" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported ref for docs publish: ${GITHUB_REF}"
            exit 1
          fi

      - name: Install TeX Live
        uses: zauguin/install-texlive@v4
        with:
          packages: >
            l3build scheme-basic fontawesome5 pdfcol tikzfill float caption
            hypdoc koma-script xcolor lualatex-math unicode-math fancyvrb
            booktabs mdwtools parskip tcolorbox luatexbase

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore timestamps
        uses: chetan/git-restore-mtime-action@v2

      - uses: leafo/gh-actions-lua@v12

      - name: Extract DTX documentation
        run: lua scripts/extract-dtx-docs.lua

      - name: Render Quarto Project
        uses: quarto-dev/quarto-actions/render@v2
        env:
          MOLOCH_DOC_CHANNEL: ${{ steps.targets.outputs.doc_channel }}
        with:
          path: docs

      - name: Publish to gh-pages
        shell: bash
        env:
          TARGETS: ${{ steps.targets.outputs.targets }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          tmp="$(mktemp -d)"
          cleanup() {
            git worktree remove --force "$tmp" 2>/dev/null || true
          }
          trap cleanup EXIT

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add "$tmp" origin/gh-pages
            cd "$tmp"
            git checkout -B gh-pages
          else
            git worktree add --detach "$tmp"
            cd "$tmp"
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
          fi

          for target in ${TARGETS}; do
            mkdir -p "$target"
            rsync -a --delete --exclude '.git' "${GITHUB_WORKSPACE}/docs/_site/" "$target/"
          done

          touch .nojekyll

          git add -A
          if git diff --cached --quiet; then
            echo "No docs changes to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: publish ${REF_TYPE} ${REF_NAME}"
          git push origin gh-pages

      - name: Submit sitemap to IndexNow
        if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_as == 'latest') }}
        uses: bojieyang/indexnow-action@v2
        with:
          sitemap-location: https://moloch.ink/sitemap.xml
          key: b6676524932b4f4a941b4a5a00d96549
          failure-strategy: error
